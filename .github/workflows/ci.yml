name: CI Pipeline

# Trigger the workflow on pushes and pull requests targeting the main branch
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    frontend-lint:
        name: Frontend (Next.js) Lint
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./web
        
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: web/package-lock.json
            
            - name: Install Dependencies
              run: npm ci
            
            - name: Run ESLint (Frontend Linting)
              run: npm run lint

    backend-lint:
        name: Backend (FastAPI) Lint
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./api
        
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            
            - name: Install Dependencies & Flake8
              run: |
                python -m pip install --upgrade pip
                pip install flake8
                if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            
            - name: Run Flake8 (Backend Linting)
              # Stop the build if there are Python syntax errors or undefined names
              run: |
                flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                # Exit-zero treats all errors as warnings. Adjust configuration later if desired.
                flake8 . --count --max-complexity=10 --max-line-length=127 --statistics